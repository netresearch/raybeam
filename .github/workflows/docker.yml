name: Docker

on:
  schedule:
    - cron: "0 0 * * 0"
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: netresearch/.github/.github/workflows/build-container.yml@4f6d149347c61a27ce243f5ac8011d6748487341 # main
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
      attestations: write
    with:
      image-name: raybeam
      platforms: "linux/386,linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64"
