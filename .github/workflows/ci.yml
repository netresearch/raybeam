name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-check:
    name: Go
    uses: netresearch/.github/.github/workflows/go-check.yml@main
    permissions:
      contents: read
      security-events: write
    with:
      go-version-file: go.mod
      setup-bun: false
      enable-codecov: true
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint-meta:
    name: Meta
    uses: netresearch/.github/.github/workflows/ci.yml@main
    permissions:
      contents: read
